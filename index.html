<!doctype html>
<html lang="en" data-theme="dark">
  <!--
    data-theme="dark" is set here so the dark theme is active before any
    stylesheet or script loads — no inline script required.
    app.js reads localStorage and applies the saved theme early in DOMContentLoaded.
    A brief transition on startup when a non-dark theme was saved is acceptable.
  -->
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Enterprise AI Test Case Generator — Jira-integrated"
    />
    <title>AI Test Case Generator</title>
    <link rel="stylesheet" href="./css/styles.css" />
    <script type="module" src="./js/app.js"></script>
  </head>

  <body>
    <!-- ══ Application Header ══════════════════════════════════════════════ -->
    <header id="app-header" role="banner" aria-label="Application header">
      <!--
        Rendered dynamically by ui.renderHeader().
        The element is intentionally empty here; app.js populates it during init.
      -->
    </header>

    <!-- ══ Three-Panel Workspace ════════════════════════════════════════════ -->
    <div class="workspace">
      <!-- Panel 1 — Jira Issue List ───────────────────────────────────────── -->
      <aside
        id="panel-issues"
        class="panel panel-issues"
        aria-label="Jira issue list"
      >
        <div class="panel-header">
          <h2 class="panel-title">Issues</h2>
          <button
            id="btn-refresh-issues"
            type="button"
            class="btn btn-icon btn-ghost"
            aria-label="Refresh issue list"
            title="Refresh"
          >
            <!-- SVG icon injected by ui.setRefreshButtonLoading() -->
          </button>
        </div>

        <!-- Search and filter controls -->
        <div class="issue-controls">
          <label for="search-issues" class="sr-only">Search issues</label>
          <input
            type="search"
            id="search-issues"
            class="input-search"
            placeholder="Search by key or summary"
            aria-label="Search issues by key or summary"
            autocomplete="off"
            spellcheck="false"
          />
          <div class="filter-row">
            <label for="filter-status" class="sr-only">Filter by status</label>
            <select
              id="filter-status"
              class="select-filter"
              aria-label="Filter by status"
            >
              <option value="all">All Statuses</option>
            </select>

            <label for="filter-priority" class="sr-only"
              >Filter by priority</label
            >
            <select
              id="filter-priority"
              class="select-filter"
              aria-label="Filter by priority"
            >
              <option value="all">All Priorities</option>
              <option value="P1">P1</option>
              <option value="P2">P2</option>
              <option value="P3">P3</option>
              <option value="P4">P4</option>
            </select>
          </div>

          <div
            id="issue-count"
            class="issue-count"
            aria-live="polite"
            aria-atomic="true"
          ></div>
        </div>

        <!-- Issue list items rendered by ui.js -->
        <div
          id="issue-list-container"
          role="list"
          aria-label="Jira issues"
          aria-busy="false"
        ></div>
      </aside>

      <!-- Panel 2 — Selected Issue Details ───────────────────────────────── -->
      <section
        id="panel-details"
        class="panel panel-details"
        aria-label="Issue details"
      >
        <!-- Scrollable field content -->
        <div
          id="detail-content"
          aria-live="polite"
          aria-label="Issue detail content"
        >
          <!-- Rendered by ui.renderDetailEmpty() / ui.renderIssueDetails() -->
        </div>

        <!-- Sticky footer — always visible at the bottom of the panel -->
        <div
          id="detail-actions"
          class="detail-actions"
          aria-label="Issue actions"
        >
          <!-- Generate button rendered here by ui.renderIssueDetails() -->
        </div>
      </section>

      <!-- Panel 3 — AI Assistant & Test Cases ────────────────────────────── -->
      <aside
        id="panel-chat"
        class="panel panel-chat"
        aria-label="AI assistant and test case results"
      >
        <!-- Conversation log -->
        <div
          id="chat-messages"
          class="chat-messages"
          role="log"
          aria-live="polite"
          aria-label="Conversation history"
          aria-relevant="additions"
        ></div>

        <!-- Input area -->
        <div class="chat-input-area">
          <!-- Context chip: shown when an issue is selected -->
          <div
            id="chat-context-chip"
            class="context-chip"
            hidden
            aria-live="polite"
            aria-atomic="true"
          ></div>

          <!-- Inline validation message -->
          <div
            id="validation-message"
            class="validation-message"
            role="alert"
            aria-atomic="true"
            hidden
          ></div>

          <!-- Prompt row -->
          <div class="chat-input-row">
            <label for="chat-textarea" class="sr-only">Chat prompt</label>
            <textarea
              id="chat-textarea"
              class="chat-textarea"
              placeholder='Ask for test cases, such as "Generate negative and boundary test cases"'
              aria-label="Chat prompt"
              rows="3"
              autocomplete="off"
              spellcheck="true"
            ></textarea>

            <button
              id="btn-send"
              type="button"
              class="btn btn-primary btn-send"
              aria-label="Send message"
              disabled
            >
              <svg
                width="16"
                height="16"
                viewBox="0 0 16 16"
                fill="none"
                xmlns="http://www.w3.org/2000/svg"
                aria-hidden="true"
                focusable="false"
              >
                <path
                  d="M2 8l12-5.5-4.5 5.5 4.5 5.5L2 8z"
                  stroke="currentColor"
                  stroke-width="1.5"
                  stroke-linejoin="round"
                  stroke-linecap="round"
                />
                <line
                  x1="2"
                  y1="8"
                  x2="9.5"
                  y2="8"
                  stroke="currentColor"
                  stroke-width="1.5"
                  stroke-linecap="round"
                />
              </svg>
            </button>
          </div>
        </div>
      </aside>
    </div>
    <!-- /.workspace -->

    <!-- ══ Mobile Tab Navigation (shown only on <768px via CSS) ════════════ -->
    <nav
      id="mobile-tab-nav"
      class="mobile-tab-nav"
      aria-label="Section navigation"
      role="tablist"
    >
      <button
        type="button"
        role="tab"
        class="mobile-tab active"
        data-panel="panel-issues"
        aria-selected="true"
        aria-controls="panel-issues"
      >
        Issues
      </button>

      <button
        type="button"
        role="tab"
        class="mobile-tab"
        data-panel="panel-details"
        aria-selected="false"
        aria-controls="panel-details"
      >
        Details
      </button>

      <button
        type="button"
        role="tab"
        class="mobile-tab"
        data-panel="panel-chat"
        aria-selected="false"
        aria-controls="panel-chat"
      >
        Assistant
      </button>
    </nav>

    <!-- ══ Toast Notification Container ════════════════════════════════════ -->
    <div
      id="toast-container"
      class="toast-container"
      aria-live="polite"
      aria-atomic="false"
      aria-label="Notifications"
    ></div>
  </body>
</html>
